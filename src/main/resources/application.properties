spring.application.name=orderservice


server.port=8083

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/smartlogixorders?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# URL of other microservices
# ProductService still uses RestTemplate (no Kafka for stock yet)
# We no longer call SHIPMENTSERVICE directly
app.productservice.url=http://localhost:8082
#app.shipmentservice.url=http://localhost:8084


spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false