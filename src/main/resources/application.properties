spring.application.name=orderservice


server.port=8083

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/smartlogixorders?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# URL of other microservices
#changed from 8082 (productservice) to 8085 (API GT)
# ProductService uses RestTemplate (no Kafka for stock )
app.productservice.url=http://localhost:8085

#We no longer call ShipmentService directly via Rest, now we use Kafka, so this is no longer needed
#app.shipmentservice.url=http://localhost:8084

#Kafka Producer side config
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

#Kafka consumer side config
spring.kafka.consumer.group-id=order-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Circuit Breaker (Resilience4j)
resilience4j.circuitbreaker.instances.productService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.productService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.productService.slidingWindowSize=5
resilience4j.circuitbreaker.instances.productService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.productService.waitDurationInOpenState=20s
resilience4j.circuitbreaker.instances.productService.permittedNumberOfCallsInHalfOpenState=2




# Expose actuator endpoints so we can see circuit state
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

